name: Sync Backend to Hugging Face Space

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**' # Chỉ chạy khi có thay đổi trong thư mục backend
  workflow_dispatch:   # Cho phép chạy bằng tay trên web GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Backend to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Clone repo từ Hugging Face
          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME hf_space
          
          # Xóa các file cũ trong Space (giữ lại .git và README.md của Hugging Face)
          cd hf_space
          find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name 'README.md' -exec rm -rf {} +
          cd ..
          
          # Copy toàn bộ code trong thư mục backend sang thư mục hf_space
          cp -a backend/. hf_space/
          
          # Push lên Hugging Face
          cd hf_space
          git add .
          git commit -m "Auto-sync Backend from GitHub Actions" || echo "Không có thay đổi nào"
          git push
